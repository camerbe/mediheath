<app-header [icone]="icone" [headerTitle]="headerTitle" class="mb-3 py-3" />
<!-- Desktop : splitter horizontal (md+) -->
<div class="hidden md:flex w-full gap-4 p-3">

  <!-- Vidéo : 70% -->
  <div class="w-[70%]  bg-gray-50 p-3 rounded-lg shadow-md">
    <video
      autoplay
      muted
      loop
      class="w-full h-full object-cover rounded-lg"
    >
      <source src="../../../../../assets/medihealth.webm" type="video/webm">
      Your browser does not support the video tag.
    </video>
  </div>

  <!-- Galerie : 30% -->
  <div class="w-[30%] flex flex-wrap gap-2 content-start">
    @for (image of images; track image.original_url) {
      <div class="w-[calc(50%-4px)]">
        <p-image
          [src]="image.original_url | replaceHost"
          [preview]="true"
          alt="Image"
          imageClass="w-full h-[71px] object-cover rounded"
        >
          <ng-template pTemplate="indicator">
            <i class="pi pi-check"></i>
          </ng-template>
        </p-image>
      </div>
    }
  </div>

</div>

<!-- Mobile : colonne (sm) -->
<div class="flex flex-col gap-4 p-3 md:hidden">

  <!-- Vidéo pleine largeur -->
  <div class="w-full">
    <video
      autoplay
      muted
      loop
      class="w-full object-cover rounded-lg"
    >
      <source src="../../../../../assets/medihealth.webm" type="video/webm">
      Your browser does not support the video tag.
    </video>
  </div>

  <!-- Galerie : 2 colonnes -->
  <div class="grid grid-cols-2 gap-2">
    @for (image of images; track image.original_url) {
      <p-image
        [src]="image.original_url | replaceHost"
        [preview]="true"
        alt="Image"
        imageClass="w-full h-[71px] object-cover rounded"
      >
        <ng-template pTemplate="indicator">
          <i class="pi pi-check"></i>
        </ng-template>
      </p-image>
    }
  </div>

</div>
