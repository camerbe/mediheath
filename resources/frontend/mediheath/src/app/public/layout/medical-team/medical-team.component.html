<!-- Header -->
<app-header [icone]="icone" [headerTitle]="headerTitle" class="mb-3 py-3" />

<!-- Organisation Chart -->
<section class="px-2 py-4">

  <!-- Mobile : 1 colonne (sm et moins) -->
  <div class="flex flex-col gap-6 md:hidden">
    @for (node of flatPhotos; track node.data.image) {
      <div class="flex flex-col items-center">
        <p-card [styleClass]="node.data.class">
          <ng-template pTemplate="header">
            <div class="flex">
              <img
                [src]="node.data.image"
                alt="doctor"
                class="w-full object-cover mt-0" />
            </div>
          </ng-template>
          <div
            class="block text-center text-sm leading-tight w-full px-2 content-wrapper text-justify"
            [innerHTML]="node.data.name"
          ></div>
        </p-card>
      </div>
    }
  </div>

  <!-- Desktop : p-organizationChart (md et plus) -->
  <div class="hidden md:block md:org-chart-wrapper">
    <p-organizationChart [value]="photos" class="w-full h-full">
    <ng-template let-node pTemplate="person">
      <div class="relative w-full flex flex-col items-center">
        <p-card
          class=""
          [styleClass]="node.data.class">
          <ng-template pTemplate="header">
            <div class="flex">
              <img
                [src]="node.data.image"
                alt="doctor"
                class="timeline-img w-fit object-cover rounded-t-lg" />
            </div>
          </ng-template>
          <div
            class="block text-center text-sm leading-tight w-full px-2 content-wrapper"
            [innerHTML]="node.data.name"
            >

          </div>
        </p-card>
      </div>
    </ng-template>
  </p-organizationChart>
  </div>

</section>


<app-header [icone]="icone" [headerTitle]="consultantTitle" class="mb-3 py-3" />

<section class="px-2 sm:px-4 md:px-8 py-4">

  <!-- Grille : 1 col mobile, 2 col desktop -->
  <div class="flex flex-col md:flex-row md:flex-wrap gap-6">

    @for (image of images; track image.order_column) {
      @if (![1, 3, 4].includes(image.order_column)) {

        <!-- Item : pleine largeur mobile, demi-largeur desktop -->
        <div class="w-full md:w-[calc(50%-12px)]">

          <p-card styleClass="shadow-md overflow-hidden rounded-lg h-full">

            <!-- Header : Marker + Image -->
            <ng-template pTemplate="header">
              <!-- Marker -->

              <!-- Image -->
              <img
                [src]="image.original_url | replaceHost"
                [alt]="title"
                class="w-full object-cover mt-0" />
            </ng-template>

            <!-- Contenu dynamique -->
            <div class="py-2 text-justify leading-relaxed">
              @switch (image.order_column) {
                @case (2) {
                  <div [innerHTML]="lastMedicalTeam.doctor_2" class="block text-center text-sm leading-tight w-full px-2 content-wrapper consultant-html"></div>
                }
                @case (5) {
                  <div [innerHTML]="lastMedicalTeam.doctor_5" class="block text-center text-sm leading-tight w-full px-2 content-wrapper content-html"></div>
                }
              }
            </div>

          </p-card>

        </div>

      }
    }

  </div>

</section>
