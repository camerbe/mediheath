<p-splitter
  [panelSizes]="[40, 60]"
  [layout]="isMobile ? 'vertical' : 'horizontal'" class="w-full"
>
    <ng-template pTemplate>
      <div  class="col flex align-items-center justify-content-center p-3">
          <img alt="Card" src="../../../../../assets/logo-Photoroom.webp" />
        </div>
    </ng-template>

    <ng-template pTemplate>
      <div  class="col flex align-items-center justify-content-center p-3">
        <img [src]="imgUrl"  alt="MediHealth" class="w-full  border-round shadow-md object-fill" />
      </div>

    </ng-template>

</p-splitter>
<p-splitter
  [panelSizes]="[30, 25,45]"
  [layout]="isMobile ? 'vertical' : 'horizontal'" class="w-full m-3"
  styleClass="w-full items-stretch"
>
<ng-template pTemplate>
  <div class="bg-white rounded-2xl flex flex-col justify-between p-4 h-full w-full">
      <p *ngIf="lastHome"
         class="text-gray-700 text-left flex-1 w-full m-0"
         [innerHTML]="lastHome.location">
      </p>
      <p-divider></p-divider>
      <a href="https://www.mahola-health.org/" target="_blank" class="">
        <img src="../../../../../assets/logo-mahola.jpg" alt="Mahola" class="w-full h-full rounded-2xl shadow-md object-fill" />


      </a>
  </div>
</ng-template>
<ng-template pTemplate>
  <div class="bg-white rounded-2xl flex flex-col justify-between p-4 h-full w-full">
      <p *ngIf="lastHome"
         class="text-gray-700 text-left flex-1 w-full m-0"
         [innerHTML]="lastHome.open_hour">
      </p>
    </div>
</ng-template>

<ng-template pTemplate>

    <div *ngIf="lastHome"
         class="bg-white text-gray-700 text-justify p-4 h-full w-full prose md:prose-lg lg:prose-xl rounded-2xl overflow-auto content-wrapper"
         [innerHTML]="sanitizer.bypassSecurityTrustHtml(lastHome.doctor_description)">
    </div>


  </ng-template>
</p-splitter>
<div>
  <span *ngFor="let hashtag of hashtags" class="flex-row mr-3">
    <p-tag severity="danger" [value]="hashtag" class=" mt-3"/>
  </span>
</div>
