<div class="flex items-center justify-center min-h-screen bg-gray-100">
  <div class="w-1/2 max-w-sm bg-white p-6 rounded shadow-md">
    <h2 class="text-2xl font-bold text-center text-gray-700">Connexion</h2>
    <form class="mt-4" [formGroup]="frmLogin" (ngSubmit)="onSubmit()">

      <div class="mb-4">
        <label class="block text-gray-700" for="email">Email</label>
        <input
          id="email"
          type="text"
          pInputText
          formControlName="email"
          class="w-full mt-1 border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <div class="mb-4">
        <label class="block text-gray-700">Mot de passe</label>
        <p-password
          formControlName="password"
          [toggleMask]="true"
          styleClass="w-full"
          inputStyleClass="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <div *ngIf="erreur && erreur.length" class="mb-4">
        <p-messages
          severity="error"
          [value]="[{ severity: 'error', summary: 'Erreur', detail: erreur }]"
          [enableService]="false"
          [closable]="false"
        />
      </div>

      <p-button type="submit" label="Se connecter" icon="pi pi-check" iconPos="right" styleClass="w-full" />

    </form>
  </div>
</div>
