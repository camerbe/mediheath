<div class="h-screen flex flex-col bg-amber-400">

  <!-- Header -->
  <header class="w-full bg-white shadow-md px-4 py-3 flex items-center justify-between">
    <h1 class="text-xl font-bold text-gray-800">Tableau de Bord</h1>
    <div class="flex gap-3">
      <button class="p-button p-button-rounded p-button-outlined">
        <i class="pi pi-user mr-2"></i>{{fullName}}
      </button>
      <button class="p-button p-button-rounded p-button-outlined" (click)="logout()">
        <i class="pi pi-power-off mr-2"></i> Déconnexion
      </button>
    </div>
  </header>

  <div class="flex flex-1 overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-52 p-3 bg-indigo-500 shadow-md flex flex-col">
      <h2 class="text-lg font-semibold text-gray-700 mb-3">Menu</h2>
      <ul class="list-none p-0 m-0 text-gray-100 space-y-2">
        <li>
          <a [routerLink]="'/secured/dashboard/centre/list'" class="flex items-center p-2 hover:bg-indigo-200 rounded">
            <i class="pi pi-cog mr-2"></i> Centres
          </a>
        </li>
        <li>
          <a [routerLink]="'/secured/dashboard/accueil/list'" class="flex items-center p-2 hover:bg-indigo-200 rounded">
            <i class="pi pi-home mr-2"></i> Home
          </a>
        </li>
        <li>
          <a [routerLink]="'/secured/dashboard/medical/list'" class="flex items-center p-2 hover:bg-indigo-200 rounded">
            <i class="pi pi-users mr-2"></i> Medical Team
          </a>
        </li>
        <li>
          <a [routerLink]="'/secured/dashboard/other/list'" class="flex items-center p-2 hover:bg-indigo-200 rounded">
            <i class="pi pi-users mr-2"></i> Other Team
          </a>
        </li>
        <li>
          <a [routerLink]="'/secured/dashboard/pole/list'" class="flex items-center p-2 hover:bg-indigo-200 rounded">
            <i class="pi pi-users mr-2"></i> Pôle
          </a>
        </li>
      </ul>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-5 bg-gray-100 overflow-auto">
      <router-outlet/>
    </main>

  </div>
</div>
