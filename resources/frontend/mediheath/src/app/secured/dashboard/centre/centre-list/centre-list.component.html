<div class="container mx-auto p-4 max-w-2xl">
  <div class="bg-white p-4 shadow-md rounded">
    <p-table
      [value]="centres"
      [paginator]="true"
      [rows]="5"
    >
      <ng-template pTemplate="caption">
        <div class="flex justify-between">
          <p-button [outlined]="true" icon="pi pi-plus" label="Nouveau" (onClick)="addCentre()" />
          <p-button [outlined]="true" icon="pi pi-list" label="Liste des Centres" />
        </div>
      </ng-template>

      <ng-template pTemplate="header">
        <tr class="capitalize">
          <th>description</th>
          <th class="text-right">Action</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-centre>
        <tr>
          <td>{{ centre.meta.title }}</td>
          <td class="flex justify-end gap-2">
            <p-button icon="pi pi-trash" [rounded]="true" severity="danger" size="small" (onClick)="deleteCentre(centre.id)" />
            <p-button icon="pi pi-pencil" [rounded]="true" severity="info" size="small" (onClick)="editCentre(centre.id)" />
          </td>
        </tr>
      </ng-template>

    </p-table>
  </div>
</div>
