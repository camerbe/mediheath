<div class="container mx-auto p-4 max-w-2xl">
  <div class="bg-white rounded-lg shadow-md p-6">
    <p-table
      [value]="poles"
      [paginator]="true"
      [rows]="5"
    >
      <!-- Caption -->
      <ng-template pTemplate="caption">
        <div class="flex justify-between items-center">
          <p-button [outlined]="true" icon="pi pi-plus" label="Nouveau" (onClick)="addPole()" />
          <p-button [outlined]="true" icon="pi pi-list" label="Liste des Pôles" />
        </div>
      </ng-template>

      <!-- Header -->
      <ng-template pTemplate="header">
        <tr class="capitalize">
          <th class="text-left">Description</th>
          <th class="text-right">Action</th>
        </tr>
      </ng-template>

      <!-- Body -->
      <ng-template pTemplate="body" let-pole>
        <tr>
          <td [innerHTML]="pole.description"></td>
          <td class="text-right">
            <div class="flex justify-end items-center gap-2">
              <p-button
                icon="pi pi-trash"
                [rounded]="true"
                severity="danger"
                size="small"
                class="bg-red-500 text-gray-100 rounded-full mr-2"
                (onClick)="deletePole(pole.id)"
              />
              <p-button
                icon="pi pi-pencil"
                [rounded]="true"
                severity="info"
                size="small"
                 class="bg-blue-500 text-gray-100 rounded-full"
                (onClick)="editPole(pole.id)"
              />
            </div>
          </td>
        </tr>
      </ng-template>

    </p-table>
  </div>
</div>
