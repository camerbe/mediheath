<div class="container mx-auto p-4 max-w-2xl">
  <div class="bg-white p-4 shadow-md rounded">
    <p-table
      [value]="homes"
      [paginator]="true"
      [rows]="5"
    >
      <ng-template pTemplate="caption">
        <div class="flex justify-between">
          <p-button [outlined]="true" icon="pi pi-plus" label="Nouveau" (onClick)="addHome()" />
          <p-button [outlined]="true" icon="pi pi-list" label="Liste des Homes" />
        </div>
      </ng-template>

      <ng-template pTemplate="header">
        <tr class="capitalize">
          <th>Image</th>
          <th class="text-right">Action</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-home>
        <tr>
          <td class="flex items-center gap-3">
            {{ home.id }}
          </td>
          <td class="flex justify-end gap-2">
            <p-button class="bg-red-600 text-white rounded-full" icon="pi pi-trash" [rounded]="true"  size="small" (onClick)="deleteHome(home.id)" />
            <p-button class="bg-blue-600 text-white rounded-full" icon="pi pi-pencil" [rounded]="true" severity="info" size="small" (onClick)="editHome(home.id)" />
          </td>
        </tr>
      </ng-template>

    </p-table>
  </div>
</div>
